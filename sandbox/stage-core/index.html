<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>stage-core sandbox</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --border: #30363d;
        --ink: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --page: #f5f5f0;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg); color: var(--ink);
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex; flex-direction: column; overflow: hidden;
      }
      header {
        display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center;
        padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
      }
      header .group { display: flex; align-items: center; gap: 6px; }
      header .sep { width: 1px; height: 22px; background: var(--border); }
      label { color: var(--muted); }
      select, input[type="number"], button {
        background: #0d1117; color: var(--ink); border: 1px solid var(--border);
        border-radius: 6px; padding: 5px 9px; font: inherit;
      }
      button { cursor: pointer; }
      button:hover { border-color: var(--accent); color: var(--accent); }
      button:active { transform: translateY(1px); }
      button.primary { border-color: var(--accent); color: var(--accent); }
      input[type="number"] { width: 92px; }
      input[type="checkbox"] { accent-color: var(--accent); }
      .title { font-weight: 700; color: var(--accent); margin-right: 4px; letter-spacing: .3px; }

      main { position: relative; flex: 1; min-height: 0; }
      #stage {
        position: absolute; inset: 0; overflow: hidden;
        background: radial-gradient(circle at 1px 1px, #1b2130 1px, transparent 0) 0 0 / 28px 28px, var(--bg);
        touch-action: none; cursor: grab;
      }
      #stage.dragging { cursor: grabbing; }

      /* world layer: pages at fixed UNSCALED size; zoom/pan = one transform here */
      #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
      .page {
        position: absolute; background: var(--page); border-radius: 2px;
        box-shadow: 0 6px 18px rgba(0,0,0,.45); will-change: transform; contain: strict;
      }
      .page.cur { outline: 2px solid var(--accent); outline-offset: 0; }
      /* crisp tiles for deep zoom: screen-space, full device resolution */
      #sharp { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
      #sharp .tile { position: absolute; border-radius: 2px; }

      #hud, #help {
        position: absolute; bottom: 12px; background: rgba(13,17,23,.82);
        border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
        backdrop-filter: blur(4px); color: var(--muted);
      }
      #hud { left: 12px; white-space: pre; pointer-events: none; }
      #hud b { color: var(--ink); font-weight: 700; } #hud .hl { color: var(--accent); }
      #help { right: 12px; max-width: 280px; pointer-events: none; }
      #help b { color: var(--ink); }

      /* scrollbars: a projection of the camera (drawn from it, write it on drag) */
      .scrollbar { position: absolute; z-index: 5; opacity: 0; transition: opacity .18s; }
      main:hover .scrollbar { opacity: 1; }
      .scrollbar.v { top: 0; right: 0; width: 14px; bottom: 14px; }
      .scrollbar.h { left: 0; bottom: 0; height: 14px; right: 14px; }
      .scrollbar .thumb { position: absolute; background: rgba(230,237,243,.26); border-radius: 7px; cursor: pointer; }
      .scrollbar.v .thumb { left: 3px; width: 8px; }
      .scrollbar.h .thumb { top: 3px; height: 8px; }
      .scrollbar .thumb:hover, .scrollbar .thumb.active { background: rgba(88,166,255,.65); }
      .scrollbar.hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <span class="title">stage-core</span>
      <div class="group">
        <label>layout</label>
        <select id="layout">
          <option value="vertical">vertical scroll</option>
          <option value="horizontal">horizontal scroll</option>
          <option value="paginated">paginated (1 page + ◀ ▶)</option>
          <option value="grid">grid / canvas</option>
        </select>
      </div>
      <div class="group">
        <label>spread</label>
        <select id="spread">
          <option value="none">none</option>
          <option value="odd">odd (1+2)</option>
          <option value="even">even (cover)</option>
        </select>
      </div>
      <div class="group">
        <label>zoom</label>
        <select id="zoom">
          <option value="automatic">Automatic</option>
          <option value="fit-page">Fit Page</option>
          <option value="fit-width">Fit Width</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="group">
        <label>framing</label>
        <select id="framing">
          <option value="document">Document</option>
          <option value="canvas">Canvas</option>
        </select>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label>pages</label>
        <input type="number" id="pages" value="40000" min="1" max="2000000" step="1000" />
        <button id="rebuild">rebuild</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button id="prev">◀</button>
        <button id="next">▶</button>
        <button id="zoomout">−</button>
        <button id="zoomin">+</button>
        <button id="reset">reset</button>
        <button id="save" class="primary" title="persist view state and reload to prove exact restore">save &amp; reload</button>
      </div>
    </header>

    <main>
      <div id="stage"><div id="world"></div><div id="sharp"></div></div>
      <div id="vscroll" class="scrollbar v"><div class="thumb"></div></div>
      <div id="hscroll" class="scrollbar h"><div class="thumb"></div></div>
      <div id="hud"></div>
      <div id="help"><b>drag</b> pan · <b>wheel</b> scroll · <b>⌘/ctrl+wheel</b> zoom · <b>← →</b> page · <b>+ −</b> zoom · <b>0</b> reset</div>
    </main>

    <script type="module">
      import {
        toWorld, zoomAround, panByScreen, clampCamera, centerOnWorld, cameraWorldRect,
        homeCamera, linearLayout, gridLayout, groupPages, resolveZoom, anchorFromCamera,
        cameraFromAnchor, ZoomMode,
      } from './stage-core.js?v=4';

      const $ = (id) => document.getElementById(id);
      const stage = $('stage'), world = $('world'), sharp = $('sharp'), hud = $('hud');
      const clamp = (v, a, b) => Math.min(Math.max(v, a), b);

      const GAP = 16;                 // world units between pages / spread halves
      const STORE_KEY = 'stage-core/view';
      const dpr = window.devicePixelRatio || 1;
      const MAX_BACKING = 4096;       // a single page-canvas can't exceed this
      const REBASE_PX = 100000;       // rebase world origin past this (deep-scroll black)

      // ── State: the whole app is these few values. The camera is derived; the
      //    durable intent is { layout, spread, framing, zoomSpec } + an anchor. ──
      // Framing presets — named bundles over the orthogonal primitives
      // { bounded, overscroll, home, margin, zoom }. Power users override any field.
      const FRAMINGS = {
        document: { bounded: true, overscroll: 'center', home: 'start', margin: 24, zoom: { mode: ZoomMode.Automatic } },
        canvas: { bounded: false, overscroll: 0, home: 'center', margin: 0, zoom: { mode: ZoomMode.FitPage } },
      };

      let layout = 'vertical';
      let spread = 'none';
      let framing = 'document';
      /** @type {{mode:string}|{level:number}} */
      let zoomSpec = { mode: ZoomMode.Automatic };
      /** @type {import('./stage-core.js').Camera} */
      let cam = { x: 0, y: 0, zoom: 1 };
      let origin = { x: 0, y: 0 };
      let scene = null;
      let pages = [];
      let vp = { width: 0, height: 0 };

      // Overscroll applies only on the scroll axis (both axes for grid); the cross
      // axis just centres/clamps. Bounds vs home vs margin stay separate concepts.
      function constraint() {
        const f = FRAMINGS[framing];
        if (!f.bounded) return { bounded: false, overscroll: { x: 0, y: 0 } };
        const a = scene.axis;
        return {
          bounded: true,
          overscroll: {
            x: a === 'x' || a === 'grid' ? f.overscroll : 0,
            y: a === 'y' || a === 'grid' ? f.overscroll : 0,
          },
        };
      }

      // ── Fake document: deterministic page sizes for variety ──────────────────
      function makePages(n) {
        const out = new Array(n);
        for (let i = 0; i < n; i++) {
          out[i] = i % 7 === 3 ? { width: 792, height: 612 } // landscape
            : i % 11 === 5 ? { width: 420, height: 792 }      // narrow
            : { width: 612, height: 792 };                    // letter
        }
        return out;
      }
      function buildScene() {
        const grouping = groupPages(pages.length, spread);
        if (layout === 'grid') scene = gridLayout(pages, grouping, { gap: 56 });
        else if (layout === 'horizontal') scene = linearLayout(pages, grouping, { axis: 'x', gap: GAP });
        else if (layout === 'paginated') scene = linearLayout(pages, grouping, { axis: 'x', gap: GAP * 4 });
        else scene = linearLayout(pages, grouping, { axis: 'y', gap: GAP });
      }

      // ── Page content (stand-in for engine.renderPage); authored in page units ─
      function drawPage(ctx, pg) {
        ctx.fillStyle = '#f5f5f0';
        ctx.fillRect(0, 0, pg.width, pg.height);
        ctx.strokeStyle = 'rgba(27,27,27,0.16)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 9; i++) {
          const y = (pg.height * i) / 9;
          ctx.beginPath(); ctx.moveTo(pg.width * 0.08, y); ctx.lineTo(pg.width * 0.92, y); ctx.stroke();
        }
        ctx.fillStyle = 'rgba(27,27,27,0.5)';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `700 ${pg.width * 0.22}px ui-monospace, Menlo, monospace`;
        ctx.fillText(String(pg.pageIndex + 1), pg.width / 2, pg.height / 2);
      }

      // PATH 1 — whole-page raster into a world canvas (cheap, capped). Used <~2.6×.
      function rasterize(canvas, pg, renderScale) {
        const cap = MAX_BACKING / (Math.max(pg.width, pg.height) * dpr);
        const rs = Math.min(renderScale, cap);
        canvas.width = Math.max(1, Math.round(pg.width * rs * dpr));
        canvas.height = Math.max(1, Math.round(pg.height * rs * dpr));
        const ctx = canvas.getContext('2d');
        ctx.setTransform(canvas.width / pg.width, 0, 0, canvas.height / pg.height, 0, 0);
        drawPage(ctx, pg);
        canvas._renderScale = renderScale;
      }

      // PATH 2 — tiles: only the visible region of each visible page, at full device
      // resolution, in screen space. Memory bounded by viewport => sharpness unbounded.
      function needTiles() { return cam.zoom > MAX_BACKING / (792 * dpr); }
      function buildTiles() {
        sharp.innerHTML = '';
        for (const it of scene.query(cameraWorldRect(cam, vp))) {
          for (const pg of it.pages) {
            const sx = (pg.x - cam.x) * cam.zoom, sy = (pg.y - cam.y) * cam.zoom;
            const ix0 = Math.max(0, sx), iy0 = Math.max(0, sy);
            const ix1 = Math.min(vp.width, sx + pg.width * cam.zoom);
            const iy1 = Math.min(vp.height, sy + pg.height * cam.zoom);
            const cw = ix1 - ix0, ch = iy1 - iy0;
            if (cw <= 0 || ch <= 0) continue;
            const cv = document.createElement('canvas');
            cv.className = 'tile';
            cv.style.left = ix0 + 'px'; cv.style.top = iy0 + 'px';
            cv.style.width = cw + 'px'; cv.style.height = ch + 'px';
            cv.width = Math.max(1, Math.round(cw * dpr)); cv.height = Math.max(1, Math.round(ch * dpr));
            const ctx = cv.getContext('2d');
            ctx.setTransform(cam.zoom * dpr, 0, 0, cam.zoom * dpr, (sx - ix0) * dpr, (sy - iy0) * dpr);
            drawPage(ctx, pg);
            sharp.appendChild(cv);
          }
        }
      }

      // ── Projector: the only DOM code. Renders pages of visible items. ─────────
      const pool = new Map(); // pageIndex -> canvas
      function clearPool() { for (const el of pool.values()) el.remove(); pool.clear(); sharp.innerHTML = ''; }
      function render() {
        // rebase origin so transform magnitudes stay small (deep-scroll safety)
        let reposition = false;
        if (Math.abs((cam.x - origin.x) * cam.zoom) > REBASE_PX || Math.abs((cam.y - origin.y) * cam.zoom) > REBASE_PX) {
          origin = { x: cam.x, y: cam.y };
          reposition = true;
        }

        const visible = scene.query(cameraWorldRect(cam, vp));
        const curPage = anchorFromCamera(cam, scene, vp).pageIndex;
        const seen = new Set();
        for (const it of visible) {
          for (const pg of it.pages) {
            seen.add(pg.pageIndex);
            let el = pool.get(pg.pageIndex);
            if (!el) {
              el = document.createElement('canvas');
              el.className = 'page';
              el.style.width = pg.width + 'px';
              el.style.height = pg.height + 'px';
              el.style.transform = `translate(${pg.x - origin.x}px, ${pg.y - origin.y}px)`;
              el._box = pg;
              rasterize(el, pg, cam.zoom);
              world.appendChild(el);
              pool.set(pg.pageIndex, el);
            }
            el.classList.toggle('cur', pg.pageIndex === curPage);
          }
        }
        for (const [pi, el] of pool) if (!seen.has(pi)) { el.remove(); pool.delete(pi); }
        if (reposition) for (const el of pool.values()) {
          el.style.transform = `translate(${el._box.x - origin.x}px, ${el._box.y - origin.y}px)`;
        }

        world.style.transform =
          `translate(${(origin.x - cam.x) * cam.zoom}px, ${(origin.y - cam.y) * cam.zoom}px) scale(${cam.zoom})`;

        hud.innerHTML =
          `layout    <b>${layout}</b>  <span class="hl">${framing}${FRAMINGS[framing].bounded ? '' : ' ∞'}</span>\n` +
          `zoom      <b>${Math.round(cam.zoom * 100)}%</b>  <span class="hl">${'mode' in zoomSpec ? zoomSpec.mode : 'custom'}</span>\n` +
          `page      <b>${(curPage + 1).toLocaleString()}</b> / ${pages.length.toLocaleString()}\n` +
          `rendered  <span class="hl"><b>${seen.size}</b></span> pages\n` +
          `raster    ${sharpening ? '<span class="hl">⟳ preview…</span>' : needTiles() ? '<b>tiled</b> @ full res' : '<b>sharp</b>'}`;
        updateScrollbars();
      }

      // coalesce renders to one per frame
      let renderQueued = false;
      function scheduleRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => { renderQueued = false; render(); });
      }

      // ── Sharpen on settle (debounced): whole-page re-raster, or tiles if deep ─
      let settleTimer = null, sharpening = false;
      function scheduleSettle() {
        sharpening = true;
        sharp.innerHTML = '';
        if (settleTimer) clearTimeout(settleTimer);
        settleTimer = setTimeout(() => {
          settleTimer = null;
          if (needTiles()) buildTiles();
          else for (const [pi, el] of pool) if (el._renderScale !== cam.zoom) rasterize(el, scene.items[scene.itemOfPage(pi)].pages.find((p) => p.pageIndex === pi), cam.zoom);
          sharpening = false;
          scheduleRender();
          persist();
        }, 160);
      }

      // ── The single camera mutation ───────────────────────────────────────────
      function setCamera(next) {
        cam = clampCamera(next, scene.size, vp, constraint());
        scheduleRender();
        scheduleSettle();
      }

      // ── Anchor-preserving transitions (layout / spread / zoom / resize / restore)
      function applyAnchor(anchor, animate = false) {
        const item = scene.items[scene.itemOfPage(anchor.pageIndex)];
        const zoom = resolveZoom(zoomSpec, item, vp, GAP);
        const target = clampCamera(cameraFromAnchor(anchor, scene, vp, zoom), scene.size, vp, constraint());
        if (animate) animateTo(target); else setCamera(target);
        syncControls();
      }
      function currentAnchor() {
        return scene ? anchorFromCamera(cam, scene, vp) : { pageIndex: 0, fx: 0.5, fy: 0 };
      }
      // rebuild the scene but keep the user looking at the same page
      function rebuildScene() {
        const anchor = currentAnchor();
        buildScene();
        clearPool();
        origin = { x: 0, y: 0 };
        applyAnchor(anchor);
        persist();
      }

      // ── Navigation intents ───────────────────────────────────────────────────
      function goToItem(i, animate = true) {
        const item = scene.items[clamp(i, 0, scene.itemCount - 1)];
        const zoom = resolveZoom(zoomSpec, item, vp, GAP);
        const center = { x: item.x + item.width / 2, y: item.y + item.height / 2 };
        const target = clampCamera(centerOnWorld(center, vp, zoom), scene.size, vp, constraint());
        if (animate) animateTo(target); else setCamera(target);
      }
      function step(d) { cancelAnim(); goToItem(scene.itemOfPage(currentAnchor().pageIndex) + d); }
      function setZoom(spec) { zoomSpec = spec; applyAnchor(currentAnchor()); persist(); }
      function zoomByCenter(factor) {
        cancelAnim();
        setCamera(zoomAround(cam, { x: vp.width / 2, y: vp.height / 2 }, factor));
        zoomSpec = { level: cam.zoom };
        syncControls();
      }

      // tiny camera tween for paging
      let anim = null;
      const cancelAnim = () => { if (anim) cancelAnimationFrame(anim), (anim = null); };
      function animateTo(target, ms = 240) {
        cancelAnim();
        const s = { ...cam }, t0 = performance.now(), ease = (t) => 1 - Math.pow(1 - t, 3);
        const stepFn = (now) => {
          const k = ease(Math.min(1, (now - t0) / ms));
          setCamera({ x: s.x + (target.x - s.x) * k, y: s.y + (target.y - s.y) * k, zoom: s.zoom + (target.zoom - s.zoom) * k });
          if (k < 1) anim = requestAnimationFrame(stepFn); else anim = null;
        };
        anim = requestAnimationFrame(stepFn);
      }

      // ── Input: pointer (drag + pinch) and wheel ──────────────────────────────
      const pointers = new Map();
      let lastPinch = null;
      const localPt = (clientX, clientY) => {
        const r = stage.getBoundingClientRect();
        return { x: clientX - r.left, y: clientY - r.top };
      };
      stage.addEventListener('pointerdown', (e) => {
        cancelAnim();
        stage.setPointerCapture(e.pointerId);
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (pointers.size === 1) stage.classList.add('dragging');
        if (pointers.size === 2) lastPinch = pinchState();
      });
      stage.addEventListener('pointermove', (e) => {
        const prev = pointers.get(e.pointerId);
        if (!prev) return;
        const cur = { x: e.clientX, y: e.clientY };
        pointers.set(e.pointerId, cur);
        if (pointers.size === 1) {
          setCamera(panByScreen(cam, cur.x - prev.x, cur.y - prev.y));
        } else if (pointers.size === 2 && lastPinch) {
          const p = pinchState();
          // p.mid is in client coords -> convert to stage-local before zooming
          let next = zoomAround(cam, localPt(p.mid.x, p.mid.y), p.dist / lastPinch.dist);
          next = panByScreen(next, p.mid.x - lastPinch.mid.x, p.mid.y - lastPinch.mid.y);
          setCamera(next);
          zoomSpec = { level: cam.zoom };
          syncControls();
          lastPinch = p;
        }
      });
      const endPointer = (e) => {
        pointers.delete(e.pointerId);
        if (pointers.size < 2) lastPinch = null;
        if (pointers.size === 0) stage.classList.remove('dragging');
      };
      stage.addEventListener('pointerup', endPointer);
      stage.addEventListener('pointercancel', endPointer);
      function pinchState() {
        const [a, b] = [...pointers.values()];
        return { dist: Math.hypot(b.x - a.x, b.y - a.y) || 1, mid: { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 } };
      }

      stage.addEventListener('wheel', (e) => {
        e.preventDefault();
        cancelAnim();
        if (e.ctrlKey || e.metaKey) {
          setCamera(zoomAround(cam, localPt(e.clientX, e.clientY), Math.exp(-e.deltaY * 0.0015)));
          zoomSpec = { level: cam.zoom };
          syncControls();
        } else {
          const [dx, dy] = e.shiftKey ? [e.deltaY, e.deltaX] : [e.deltaX, e.deltaY];
          setCamera(panByScreen(cam, -dx, -dy));
        }
      }, { passive: false });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && layout === 'paginated') return step(-1);
        if (e.key === 'ArrowRight' && layout === 'paginated') return step(1);
        if (e.key === 'ArrowLeft') return setCamera(panByScreen(cam, 120, 0));
        if (e.key === 'ArrowRight') return setCamera(panByScreen(cam, -120, 0));
        if (e.key === 'ArrowUp') return setCamera(panByScreen(cam, 0, 120));
        if (e.key === 'ArrowDown') return setCamera(panByScreen(cam, 0, -120));
        if (e.key === '+' || e.key === '=') return zoomByCenter(1.2);
        if (e.key === '-' || e.key === '_') return zoomByCenter(1 / 1.2);
        if (e.key === '0') return reset();
      });

      // ── Scrollbars = projection of the camera ────────────────────────────────
      const vscroll = $('vscroll'), hscroll = $('hscroll');
      const vthumb = vscroll.firstElementChild, hthumb = hscroll.firstElementChild;
      function axisScroll(pos, sceneSize, viewPx, zoom) {
        const visWorld = viewPx / zoom, maxScroll = sceneSize - visWorld;
        return { thumbFrac: clamp(visWorld / sceneSize, 0, 1), posFrac: maxScroll > 0 ? clamp(pos / maxScroll, 0, 1) : 0, maxScroll };
      }
      function updateScrollbars() {
        const v = axisScroll(cam.y, scene.size.height, vp.height, cam.zoom);
        const h = axisScroll(cam.x, scene.size.width, vp.width, cam.zoom);
        const tV = vscroll.clientHeight, thV = Math.max(28, v.thumbFrac * tV);
        vscroll.classList.toggle('hidden', v.maxScroll <= 1);
        vthumb.style.height = thV + 'px'; vthumb.style.top = v.posFrac * (tV - thV) + 'px';
        const tH = hscroll.clientWidth, thH = Math.max(28, h.thumbFrac * tH);
        hscroll.classList.toggle('hidden', h.maxScroll <= 1);
        hthumb.style.width = thH + 'px'; hthumb.style.left = h.posFrac * (tH - thH) + 'px';
      }
      function dragThumb(thumb, track, vertical) {
        thumb.addEventListener('pointerdown', (e) => {
          e.preventDefault(); e.stopPropagation(); cancelAnim();
          thumb.setPointerCapture(e.pointerId); thumb.classList.add('active');
          const start = vertical ? e.clientY : e.clientX;
          const thumbPx = vertical ? thumb.offsetHeight : thumb.offsetWidth;
          const trackPx = (vertical ? track.clientHeight : track.clientWidth) - thumbPx;
          const startTop = vertical ? thumb.offsetTop : thumb.offsetLeft;
          const sceneSize = vertical ? scene.size.height : scene.size.width;
          const maxScroll = sceneSize - (vertical ? vp.height : vp.width) / cam.zoom;
          const onMove = (ev) => {
            const now = vertical ? ev.clientY : ev.clientX;
            const posFrac = trackPx > 0 ? clamp((startTop + now - start) / trackPx, 0, 1) : 0;
            setCamera(vertical ? { ...cam, y: posFrac * maxScroll } : { ...cam, x: posFrac * maxScroll });
          };
          const onUp = (ev) => {
            thumb.releasePointerCapture(ev.pointerId); thumb.classList.remove('active');
            thumb.removeEventListener('pointermove', onMove); thumb.removeEventListener('pointerup', onUp);
          };
          thumb.addEventListener('pointermove', onMove); thumb.addEventListener('pointerup', onUp);
        });
      }
      dragThumb(vthumb, vscroll, true);
      dragThumb(hthumb, hscroll, false);

      // ── Controls ─────────────────────────────────────────────────────────────
      function syncControls() {
        $('layout').value = layout;
        $('spread').value = spread;
        $('framing').value = framing;
        $('zoom').value = 'mode' in zoomSpec ? zoomSpec.mode : 'custom';
      }
      $('layout').addEventListener('change', (e) => {
        layout = e.target.value;
        framing = layout === 'grid' ? 'canvas' : 'document'; // sensible default per layout
        if (layout === 'paginated' && 'mode' in zoomSpec) zoomSpec = { mode: ZoomMode.FitPage };
        rebuildScene();
      });
      $('spread').addEventListener('change', (e) => { spread = e.target.value; rebuildScene(); });
      $('zoom').addEventListener('change', (e) => setZoom(e.target.value === 'custom' ? { level: cam.zoom } : { mode: e.target.value }));
      $('framing').addEventListener('change', (e) => {
        framing = e.target.value;
        zoomSpec = FRAMINGS[framing].zoom;  // adopt the framing's default zoom intent
        applyAnchor(currentAnchor());       // keep the same page; apply new bounds + zoom
        persist();
      });
      $('pages').addEventListener('change', loadDocument);
      $('rebuild').addEventListener('click', loadDocument);
      $('prev').addEventListener('click', () => step(-1));
      $('next').addEventListener('click', () => step(1));
      $('zoomout').addEventListener('click', () => zoomByCenter(1 / 1.2));
      $('zoomin').addEventListener('click', () => zoomByCenter(1.2));
      $('reset').addEventListener('click', reset);
      $('save').addEventListener('click', () => { persist(); location.reload(); });

      function reset() {
        cancelAnim();
        const f = FRAMINGS[framing];
        zoomSpec = f.zoom;
        const zoom = resolveZoom(zoomSpec, scene.items[0], vp, GAP);
        setCamera(homeCamera(scene, vp, zoom, { home: f.home, margin: f.margin }));
        syncControls();
        persist();
      }

      // ── Persistence: capture the full, serializable view state. Reopening the
      //    app restores the exact page, zoom intent, layout and spread. ──────────
      function persist() {
        try {
          localStorage.setItem(STORE_KEY, JSON.stringify({
            layout, spread, framing, zoom: zoomSpec, pageCount: pages.length, anchor: currentAnchor(),
          }));
        } catch {}
      }
      function loadDocument() {
        const n = clamp(parseInt($('pages').value, 10) || 1, 1, 2_000_000);
        pages = makePages(n);
        const anchor = scene ? currentAnchor() : { pageIndex: 0, fx: 0.5, fy: 0 };
        buildScene();
        clearPool();
        origin = { x: 0, y: 0 };
        applyAnchor({ ...anchor, pageIndex: Math.min(anchor.pageIndex, n - 1) });
        persist();
      }

      // ── Boot: restore saved session if present ───────────────────────────────
      function boot() {
        let saved = null;
        try { saved = JSON.parse(localStorage.getItem(STORE_KEY)); } catch {}
        layout = saved?.layout ?? 'vertical';
        spread = saved?.spread ?? 'none';
        framing = saved?.framing ?? 'document';
        zoomSpec = saved?.zoom ?? FRAMINGS[framing].zoom;
        const n = saved?.pageCount ?? 40000;
        $('pages').value = n;
        pages = makePages(n);
        buildScene();
        vp = { width: stage.clientWidth, height: stage.clientHeight };
        syncControls();
        if (saved?.anchor) applyAnchor(saved.anchor); // restore exact session…
        else reset(); // …or place at home (start + margin / centred)

        // keep the looked-at page centred across viewport resizes
        new ResizeObserver(() => {
          const anchor = currentAnchor();
          vp = { width: stage.clientWidth, height: stage.clientHeight };
          if (scene) applyAnchor(anchor);
        }).observe(stage);
      }
      boot();
    </script>
  </body>
</html>
