services:
  pdf-runtime-wasm-dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - pdf-runtime-gclient:/root/.cache
    command: bash -lc "corepack enable && PDF_RUNTIME_DEV_TARGETS=wasm32 pnpm --filter @embedpdf/pdf-runtime dev"

volumes:
  pdf-runtime-gclient:
