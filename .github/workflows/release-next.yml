name: Release Next

on:
  push:
    branches: [next]
    paths:
      - "packages/**"
      - "viewers/**"
      - "ee/**"
      - ".changeset/**"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

concurrency:
  group: release-next
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  CI: true

jobs:
  build-runtime:
    uses: ./.github/workflows/build-pdf-runtime.yml
    secrets: inherit

  release:
    needs: build-runtime
    runs-on: ubuntu-latest
    outputs:
      did_publish: ${{ steps.published.outputs.did_publish }}
      published: ${{ steps.published.outputs.published }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN:    ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Download pdf-runtime artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: pdf-runtime-*
          path: packages/pdf-runtime/_artifacts

      - name: Stage runtime payloads
        run: |
          shopt -s nullglob
          for dir in packages/pdf-runtime/_artifacts/pdf-runtime-*; do
            target="${dir##*/pdf-runtime-}"
            mkdir -p "packages/pdf-runtime/npm/$target"
            cp -R "$dir/." "packages/pdf-runtime/npm/$target/"
          done
          rm -rf packages/pdf-runtime/_artifacts

      - name: Verify pdf-runtime packages
        run: pnpm run verify:pdf-runtime-packages

      - name: Build packages
        run: pnpm run build:release

      - name: Version / Publish via Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages (next)"
          title:  "chore: version packages (next)"
          publish: pnpm ci:publish:next
          createGithubReleases: false

      - name: Detect publish summary
        id: published
        run: |
          if [ -f "pnpm-publish-summary.json" ]; then
            COUNT=$(jq '.publishedPackages | length' pnpm-publish-summary.json 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "did_publish=true" >> $GITHUB_OUTPUT
              echo "published=$(jq -c '.publishedPackages' pnpm-publish-summary.json)" >> $GITHUB_OUTPUT
              echo "version=$(jq -r '.publishedPackages[0].version' pnpm-publish-summary.json)" >> $GITHUB_OUTPUT
            else
              echo "did_publish=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "did_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Get merged PR info
        if: steps.published.outputs.did_publish == 'true'
        id: merged_pr
        uses: actions-ecosystem/action-get-merged-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release notes
        if: steps.published.outputs.did_publish == 'true'
        env:
          PR_BODY: ${{ steps.merged_pr.outputs.body }}
        run: |
          echo "$PR_BODY" | sed -n '/# Releases/,$p' | tail -n +2 > release-notes.md || true

          if [ ! -s release-notes.md ]; then
            echo "Pre-release for next branch." > release-notes.md
            echo "" >> release-notes.md
            echo "Packages published:" >> release-notes.md
            echo "${{ steps.published.outputs.published }}" >> release-notes.md
          fi

          echo "Release notes:"
          cat release-notes.md

      - name: Package published dists
        if: steps.published.outputs.did_publish == 'true'
        env:
          PUBLISHED_JSON: ${{ steps.published.outputs.published }}
        run: |
          mkdir -p release-assets
          echo "$PUBLISHED_JSON" | jq -r '.[].name' | while read name; do
            short=$(echo "$name" | sed 's!.*/!!')
            # Enterprise packages live in ee/, not packages/.
            if [[ "$name" == @cloudpdf/* ]]; then
              dir="ee/$short"
            # Handle viewers (snippet, react, vue, svelte) which are in viewers/
            elif [ "$short" = "snippet" ] || [ "$short" = "react-pdf-viewer" ] || [ "$short" = "vue-pdf-viewer" ] || [ "$short" = "svelte-pdf-viewer" ]; then
              # Map package name to directory name
              case "$short" in
                "react-pdf-viewer") dir="viewers/react" ;;
                "vue-pdf-viewer") dir="viewers/vue" ;;
                "svelte-pdf-viewer") dir="viewers/svelte" ;;
                *) dir="viewers/$short" ;;
              esac
            else
              dir="packages/$short"
            fi
            if [ -d "$dir/dist" ]; then
              echo "Packaging $short from $dir"
              (cd "$dir" && zip -r "$GITHUB_WORKSPACE/release-assets/${short}-dist.zip" dist >/dev/null)
              tar -czf "release-assets/${short}-dist.tar.gz" -C "$dir" dist
            else
              echo "No dist for $short"
            fi
          done
          ls -lh release-assets || true

      - name: Create GitHub pre-release
        if: steps.published.outputs.did_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.published.outputs.version }}
          name: "Release Next v${{ steps.published.outputs.version }}"
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: true
          make_latest: false

  # Preview container image for the `next` channel. Pushes pre-release tags
  # (the prerelease version, `next`, and `sha-<short>`) so candidates can be
  # pulled + smoke/soak tested before promotion. Never moves `latest`.
  publish-image:
    needs: [build-runtime, release]
    if: needs.release.outputs.did_publish == 'true' && contains(needs.release.outputs.published, '@cloudpdf/server')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read server version
        id: ver
        run: echo "version=$(jq -r .version ee/server/package.json)" >> "$GITHUB_OUTPUT"

      - name: Download linux-x64 native runtime
        uses: actions/download-artifact@v7
        with:
          name: pdf-runtime-linux-x64
          path: packages/pdf-runtime/npm/linux-x64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/embedpdf/cloudpdf-server
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=next
            type=sha,prefix=sha-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ee/server/Dockerfile
          platforms: linux/amd64
          build-args: |
            NATIVE_SRC=prebuilt
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
