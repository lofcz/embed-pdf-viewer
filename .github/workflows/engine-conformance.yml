name: Engine v3 Conformance

# Boots @embedpdf/server in-process and runs the metadata conformance suite
# against both engine-local (WASM) and engine-cloud (HTTP -> native PDFium).
# Any divergence between the two implementations fails the job.

on:
  pull_request:
    paths:
      - 'packages/engine-core/**'
      - 'packages/engine-services/**'
      - 'packages/engine-local/**'
      - 'packages/engine-cloud/**'
      - 'ee/server/**'
      - '.github/workflows/engine-conformance.yml'
  push:
    branches: [main]
    paths:
      - 'packages/engine-core/**'
      - 'packages/engine-services/**'
      - 'packages/engine-local/**'
      - 'packages/engine-cloud/**'
      - 'ee/server/**'
      - '.github/workflows/engine-conformance.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: engine-conformance-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  build-runtime:
    uses: ./.github/workflows/build-pdf-runtime.yml
    secrets: inherit

  conformance:
    name: local + cloud parity
    needs: build-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download pdf-runtime artifacts (linux-x64 + wasm32)
        uses: actions/download-artifact@v7
        with:
          pattern: pdf-runtime-*
          path: packages/pdf-runtime/_artifacts

      - name: Stage runtime payloads
        shell: bash
        run: |
          shopt -s nullglob
          for dir in packages/pdf-runtime/_artifacts/pdf-runtime-*; do
            target="${dir##*/pdf-runtime-}"
            mkdir -p "packages/pdf-runtime/npm/$target"
            cp -R "$dir/." "packages/pdf-runtime/npm/$target/"
          done
          rm -rf packages/pdf-runtime/_artifacts

      - name: Build engine packages
        run: |
          pnpm --filter @embedpdf/pdf-runtime build
          pnpm --filter @embedpdf/engine-core build
          pnpm --filter @embedpdf/engine-services build
          pnpm --filter @embedpdf/engine-local build
          pnpm --filter @embedpdf/server build
          pnpm --filter @embedpdf/engine-cloud build

      - name: engine-local conformance (WASM)
        run: pnpm --filter @embedpdf/engine-local test

      - name: engine-cloud conformance (HTTP -> @embedpdf/server, native)
        run: pnpm --filter @embedpdf/engine-cloud test

      - name: Engine v3 parity demo (local vs cloud)
        run: pnpm --filter @embedpdf/example-pdf-runtime-demo run engine:node
