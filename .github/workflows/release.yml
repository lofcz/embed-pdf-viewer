name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump for the React viewer stack (+ fonts)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  CI: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'lofcz/embed-pdf-viewer' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          # Keep in sync with packageManager in package.json (lockfile pin).
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          # Do NOT set registry-url: it writes `_authToken=${NODE_AUTH_TOKEN}`
          # which blocks OIDC when the token is absent (ENEEDAUTH / E404).

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        id: bump
        run: node scripts/bump-publishable.mjs ${{ inputs.release_type }}

      - name: Build packages
        run: pnpm run build:viewers

      - name: Publish to npm (OIDC trusted publishing)
        run: pnpm ci:publish
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Commit, tag, and push
        id: git
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages viewers
          if git diff --cached --quiet; then
            echo "No version file changes to commit."
          else
            git commit -m "chore: release v${VERSION}"
          fi
          # main may have moved while build/publish ran — rebase before push
          git fetch origin "$BRANCH"
          if ! git rebase "origin/$BRANCH"; then
            echo "Rebase conflict integrating origin/${BRANCH}; resolve and re-run."
            git rebase --abort || true
            exit 1
          fi
          # Tag after rebase so it points at the commit we push
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            git tag -d "v${VERSION}"
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "HEAD:${BRANCH}"
          git push origin "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.git.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.git.outputs.version }}
          name: Release v${{ steps.git.outputs.version }}
          body: |
            Manual `${{ inputs.release_type }}` release of `@lofcz/embedpdf-react-pdf-viewer` v${{ steps.git.outputs.version }}.

            Published via npm trusted publishing (`release.yml` → `lofcz/embed-pdf-viewer`).
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
