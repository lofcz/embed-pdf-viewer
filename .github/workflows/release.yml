name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "viewers/**"
      - ".changeset/**"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  CI: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Only publish from the fork that owns the @lofcz/embedpdf-* packages.
    if: ${{ github.repository == 'lofcz/embed-pdf-viewer' }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Writes ~/.npmrc with //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:viewers

      # Opens a Version Packages PR when changesets exist, or publishes when
      # that PR has been merged (versions already bumped, no pending changesets).
      - name: Version / Publish via Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
          publish: pnpm ci:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # After `pnpm trust:setup` (npm trust github → release.yml on
          # lofcz/embed-pdf-viewer), OIDC via id-token publishes without a
          # token. Keep NPM_TOKEN only as a temporary fallback until every
          # package has a trusted publisher configured.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Detect publish summary
        id: published
        run: |
          SUMMARY=""
          if [ -f "pnpm-publish-summary.json" ]; then
            SUMMARY="pnpm-publish-summary.json"
          elif [ -f "publish-summary.json" ]; then
            SUMMARY="publish-summary.json"
          fi

          if [ -n "$SUMMARY" ]; then
            COUNT=$(jq '.publishedPackages | length' "$SUMMARY" 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "did_publish=true" >> "$GITHUB_OUTPUT"
              echo "published=$(jq -c '.publishedPackages' "$SUMMARY")" >> "$GITHUB_OUTPUT"
              echo "version=$(jq -r '.publishedPackages[0].version' "$SUMMARY")" >> "$GITHUB_OUTPUT"
            else
              echo "did_publish=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Fallback: changesets/action already reports published
            if [ "${{ steps.changesets.outputs.published }}" = "true" ]; then
              echo "did_publish=true" >> "$GITHUB_OUTPUT"
              echo "published=${{ steps.changesets.outputs.publishedPackages }}" >> "$GITHUB_OUTPUT"
              echo "version=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version // empty')" >> "$GITHUB_OUTPUT"
            else
              echo "did_publish=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Get merged PR info
        if: steps.published.outputs.did_publish == 'true'
        id: merged_pr
        uses: actions-ecosystem/action-get-merged-pull-request@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release notes
        if: steps.published.outputs.did_publish == 'true'
        env:
          PR_BODY: ${{ steps.merged_pr.outputs.body }}
        run: |
          echo "$PR_BODY" | sed -n '/# Releases/,$p' | tail -n +2 > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "Automated release." > release-notes.md
          fi
          echo "Release notes:"
          cat release-notes.md

      - name: Package published dists
        if: steps.published.outputs.did_publish == 'true'
        env:
          PUBLISHED_JSON: ${{ steps.published.outputs.published }}
        run: |
          mkdir -p release-assets
          echo "$PUBLISHED_JSON" | jq -r '.[].name' | while read -r name; do
            # @lofcz/embedpdf-react-pdf-viewer → react-pdf-viewer
            short=$(echo "$name" | sed 's!^@lofcz/embedpdf-!!')
            case "$short" in
              react-pdf-viewer) dir="viewers/react" ;;
              snippet) dir="viewers/snippet" ;;
              fonts-*) dir="packages/fonts/${short#fonts-}" ;;
              *) dir="packages/$short" ;;
            esac
            if [ -d "$dir/dist" ]; then
              echo "Packaging $short from $dir"
              tar -czf "release-assets/${short}-dist.tar.gz" -C "$dir" dist
            else
              echo "No dist for $short ($dir)"
            fi
          done
          ls -lh release-assets || true

      - name: Create GitHub Release
        if: steps.published.outputs.did_publish == 'true' && steps.published.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.published.outputs.version }}
          name: Release v${{ steps.published.outputs.version }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: false
          make_latest: true
