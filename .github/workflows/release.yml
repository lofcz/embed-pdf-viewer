name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump for the React viewer stack (+ fonts)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  CI: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'lofcz/embed-pdf-viewer' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Needed so the version commit/tag can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # registry-url writes an .npmrc with _authToken=${NODE_AUTH_TOKEN}.
          # That makes setup-node inject secrets.NPM_TOKEN and overrides OIDC
          # trusted publishing (npm then returns E404 on PUT for scoped pkgs).
          # Do NOT set registry-url / NODE_AUTH_TOKEN / NPM_TOKEN here.

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Bump versions
        id: bump
        run: node scripts/bump-publishable.mjs ${{ inputs.release_type }}

      - name: Build packages
        run: pnpm run build:viewers

      - name: Publish to npm (OIDC trusted publishing)
        run: pnpm ci:publish
        env:
          NPM_CONFIG_PROVENANCE: "true"

      - name: Commit, tag, and push
        id: git
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages viewers
          if git diff --cached --quiet; then
            echo "No version file changes to commit."
          else
            git commit -m "chore: release v${VERSION}"
          fi
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "Tag v${VERSION} already exists locally."
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
          fi
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.git.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.git.outputs.version }}
          name: Release v${{ steps.git.outputs.version }}
          body: |
            Manual `${{ inputs.release_type }}` release of `@lofcz/embedpdf-react-pdf-viewer` v${{ steps.git.outputs.version }}.

            Published via npm trusted publishing (`release.yml` → `lofcz/embed-pdf-viewer`).
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
