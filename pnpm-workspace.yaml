packages:
  # include packages in subfolders (change as required)
  - 'packages/**'
  - 'examples/**'
  - 'viewers/*'
  - 'website'
  - 'ee/*'
  # exclude generated framework outputs that can contain nested package.json
  # copies and confuse pnpm/turbo workspace discovery.
  - '!**/.next/**'
  - '!**/.svelte-kit/**'
  - '!**/.vercel/**'
  # exclude the git submodule (and everything inside it)
  - '!packages/pdfium/pdfium-src/**'
  - '!packages/pdf-runtime/runtime-src/**'
